{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card text-center shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Подтвердите удаление</h5>
            <p class="card-text">
                Вы действительно хотите удалить чат "<strong>{{ chat.title }}</strong>"?
            </p>
            <form action="/chat/delete_chat/{{ chat.id }}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
            </form>
            <a href="/main_page" class="btn btn-secondary">Отмена</a>
        </div>
    </div>
</div>
{% endblock %}
