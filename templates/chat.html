{% extends "base.html" %}

{% block content %}
<a href="/main_page" class="btn btn-warning mt-3 ms-3">Вернуться на главную</a>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>{{ title }}</h4>
    <div>
        <a href="{{ url_for('add_user_to_chat', chat_id=chatting.id) }}"
           class="btn btn-outline-success btn-sm me-2">
            + Пригласить
        </a>
        <form action="{{ url_for('leave_chat', chat_id=chatting.id) }}" method="post"
              style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите выйти из чата?');">
            <button type="submit" class="btn btn-outline-danger btn-sm">
                Выйти из чата
            </button>
        </form>
    </div>
</div>
<div class="container mt-3">
    {% for key, message in messages.items() %}
    {% endfor %}
    <form method="post">
        <div class="row">
            <div class="col-sm-6 col-md-11">
                <textarea class="form-control mt-4" aria-label="With textarea" id="text" name="text"></textarea>
            </div>
            <div class="col-6 col-md-1 mt-4">
                <button type="submit" class="btn btn-primary">Отправить</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
