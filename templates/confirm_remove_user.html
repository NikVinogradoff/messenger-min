{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card text-center shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Подтвердите удаление</h5>
            <p class="card-text">
                Вы действительно хотите выгнать пользователя <strong>{{ user.name }} {{ user.surname }}</strong> из чата "<strong>{{ chat.title }}</strong>"?
            </p>
            <form action="/chat/{{ chat.id }}/remove_user/{{ user.id }}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger me-2">Да, выгнать</button>
            </form>
            <a href="/chat/{{ chat.id }}/members" class="btn btn-secondary">Отмена</a>
        </div>
    </div>
</div>
{% endblock %}
