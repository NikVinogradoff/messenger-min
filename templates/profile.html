{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">
        <div class="card-body text-center p-4">
            <form method="POST" enctype="multipart/form-data" class="mb-3">
                <label class="d-block position-relative d-inline-block">
                    <div style="width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px;">
                        {% if avatar_url %}
                            <img src="{{ avatar_url }}" alt="Аватар"
                                style="width: 100%; height: 100%; object-fit: cover;">
                        {% else %}
                            <div style="width: 100%; height: 100%; background-color: #6482c0; color: white;
                                        display: flex; align-items: center; justify-content: center; font-size: 60px;">
                                {{ current_user.name[0].upper() }}
                            </div>
                        {% endif %}
                    </div>
                    <input type="file"
                           name="avatar"
                           accept="image/*"
                           onchange="this.form.submit()"
                           class="position-absolute top-0 start-0 w-100 h-100 opacity-0"
                           aria-label="Загрузить аватар">
                </label>
            </form>
            <h4 class="fw-semibold text-dark mb-1">
                {{ current_user.name }} {{ current_user.surname }}
            </h4>
            <p class="text-muted mb-3">
                <i class="bi bi-envelope-fill text-primary me-1"></i>
                {{ current_user.email }}
            </p>
            <div class="d-grid gap-2 mt-3">
                <a href="/settings" class="btn btn-outline-secondary">Настройки</a>
            </div>
            <hr class="my-3">
            <div class="d-grid gap-2">
                <a href="/main_page" class="btn btn-outline-primary">
                    <i class="bi bi-arrow-left"></i> Вернуться на главную
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #f5f7fa;
        font-family: 'Segoe UI', sans-serif;
    }
    .card {
        border-radius: 16px;
    }
    .btn {
        border-radius: 8px;
    }
</style>
{% endblock %}
