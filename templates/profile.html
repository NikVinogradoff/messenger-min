{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">
        <div class="card-body text-center p-4">
            <form method="POST" enctype="multipart/form-data" class="mb-3">
                <label class="d-block position-relative d-inline-block">
                    <img src="{{ avatar_url if avatar_url else url_for('static', filename='img/min_logo.png') }}"
                         alt="{{ url_for('static', filename='img/min_logo.png') }}"
                         class="rounded-circle border-3 border-primary"
                         width="96"
                         height="96"
                         style="object-fit: cover; cursor: pointer;"
                         id="avatar-preview">
                    <input type="file"
                           name="avatar"
                           accept="image/*"
                           onchange="this.form.submit()"
                           class="position-absolute top-0 start-0 w-100 h-100 opacity-0"
                           aria-label="Загрузить аватар">
                </label>
            </form>
            <h4 class="fw-semibold text-dark mb-1">
                {{ current_user.name }} {{ current_user.surname }}
            </h4>
            <p class="text-muted mb-3">
                <i class="bi bi-envelope-fill text-primary me-1"></i>
                {{ current_user.email }}
            </p>
            <hr class="my-3">
            <div class="d-grid gap-2">
                <a href="/main_page" class="btn btn-outline-primary">
                    <i class="bi bi-arrow-left"></i> Вернуться на главную
                </a>
            </div>
        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background-color: #f5f7fa;
        font-family: 'Segoe UI', sans-serif;
    }
    .card {
        border-radius: 16px;
    }
    .btn {
        border-radius: 8px;
    }
</style>
{% endblock %}
